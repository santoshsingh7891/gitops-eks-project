replicaCount: 2

image:
  repository: 539247463081.dkr.ecr.ap-south-1.amazonaws.com/gitops-app
  pullPolicy: Always
  tag: latest

serviceAccount:
  create: true

service:
  type: LoadBalancer
  port: 80

containerPort: 5000

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

ingress:
  enabled: false

httpRoute:
  enabled: false

autoscaling:
  enabled: false

