apiVersion: v1
kind: Service

metadata:
  name: {{ include "gitops-chart.fullname" . }}

  labels:
    {{- include "gitops-chart.labels" . | nindent 4 }}

spec:
  type: {{ .Values.service.type }}

  ports:
    - port: 80
      targetPort: 5000
      protocol: TCP
      name: http

  selector:
    {{- include "gitops-chart.selectorLabels" . | nindent 4 }}
