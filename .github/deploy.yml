name: GitOps CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: gitops-app
  IMAGE_TAG: latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Docker Image
      run: |
        docker build -t gitops-app .

    - name: Tag Docker Image
      run: |
        docker tag gitops-app:latest 539247463081.dkr.ecr.ap-south-1.amazonaws.com/gitops-app:latest

    - name: Push Docker Image
      run: |
        docker push 539247463081.dkr.ecr.ap-south-1.amazonaws.com/gitops-app:latest
